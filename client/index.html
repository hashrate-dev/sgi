  <head>
    <meta charset="UTF-8" />

    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="/LOGO-CUADRADO-HRS.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
    <script>
      (function () {
        var a = Element.prototype.appendChild;
        var b = Element.prototype.insertBefore;
        Element.prototype.appendChild = function (c) {
          if (c && c.classList && c.classList.contains("calendly-spinner")) return c;
          return a.call(this, c);
        };
        Element.prototype.insertBefore = function (c, r) {
          if (c && c.classList && c.classList.contains("calendly-spinner")) return c;
          return b.call(this, c, r);
        };
      })();
    </script>
    <link href="/css/calendly-hrs.css?v=9" rel="stylesheet" />
    <title>Hashrate Space — high-performance Bitcoin mining infrastructure, datacenters and ASIC marketplace</title>
    <script>
      (function () {
        var path = window.location.pathname || "";
        if (path === "/marketplace" || path.startsWith("/marketplace/")) {
          document.title = "Hashrate Space — high-performance Bitcoin mining infrastructure, datacenters and ASIC marketplace";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Calendly: botón flotante + popup modal (la página actual queda visible detrás) -->
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    <script src="/js/calendly-hrs.js?v=10" defer></script>
  </body>
