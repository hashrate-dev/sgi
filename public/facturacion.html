<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashrate Space — high-performance Bitcoin mining infrastructure, datacenters and ASIC marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>



<style>

    </style>




<body>

    <div class="container-fluid p-0">
        <div class="faja-logo">
            <img src="images/LOGO-FACTURA-1.png" alt="HRS Logo Banner">
        </div>
    </div>

    <div class="container-fluid p-0 mb-4">
        <div class="header-fino-ancho py-3 text-center">
            <h1 class="mb-0">HRS GROUP S.A</h1>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row">
            
            <div class="col-lg-3" style="width: 330px; height: 610px;">
                <div class="card p-2 mb-4 shadow-sm">
                    <h6 class="fw-bold mb-3 border-bottom pb-2">⚙️ CONFIGURACIÓN</h6>
                    
                    <div class="mb-3">
                        <label class="seccion-titulo d-block mb-1">Comprobante</label>
                        <select id="tipoComprobante" class="form-select form-select-sm" onchange="generarNumeroFactura()">
                            <option value="Factura">Factura</option>
                            <option value="Recibo">Recibo</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="seccion-titulo d-block mb-1">N° Correlativo</label>
                        <input id="numeroFactura" class="form-control form-control-sm text-center" readonly>
                    </div>

                    <div class="mb-2">
                        <label class="seccion-titulo d-block mb-1">Cliente</label>
                        <input type="text" id="buscadorCliente" class="form-control form-control-sm mb-2" placeholder="Filtrar cliente..." oninput="filtrarClientes()">
                        <select id="clienteSelect" class="form-select form-select-sm" size="8" onchange="seleccionarCliente()"></select>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="card p-3 shadow-sm contenedor-tabla-fija">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold mb-0">🛠️ DETALLE DE SERVICIOS</h6>
                        <button class="btn btn-dark btn-sm px-3" onclick="agregarServicio()">+ Agregar Ítem</button>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle" style="table-layout: fixed; width: 100%;">
                            <thead class="table-light">
                                <tr class="small text-uppercase text-center" style="font-size: 0.75rem;">
                                    <th style="width: 35%;">Servicio</th> 
                                    <th style="width: 18%;">Mes</th>
                                    <th style="width: 10%;">Cant.</th>
                                    <th style="width: 12%;">Precio</th>
                                    <th style="width: 10%;">Desc.</th>
                                    <th style="width: 12%;">Total</th>
                                    <th style="width: 40px;"></th> 
                                </tr>
                            </thead>
                            <tbody id="serviciosBody">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="row g-3 justify-content-end mt-2">
                    <div class="col-md-3">
                        <div class="card card-total p-3 text-center bg-white shadow-sm" style="padding: 0;  height: 75px">
                            <span class="text-muted fw-bold total-label">SUBTOTAL</span>
                            <input id="subtotal" class="form-control border-0 text-center fw-bold bg-transparent total-input" readonly value="0.00">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-total p-3 text-center bg-white shadow-sm" style="padding: 0;  height: 75px">
                            <span class="text-danger fw-bold total-label">DESCUENTOS</span>
                            <input id="descuentos" class="form-control border-0 text-center fw-bold text-danger bg-transparent total-input" readonly value="0.00">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card card-total p-3 text-center bg-total-final text-white shadow" style="padding: 0; height: 90px;">
                            <span class="fw-bold total-label" style="opacity: 0.9;">TOTAL FINAL</span>
                            <div class="d-flex justify-content-center align-items-center">
                                <span class="h3 mb-0 me-1">$</span>
                                <input id="totalFinal" class="form-control border-0 text-center fw-bold text-white bg-transparent total-input" style="font-size: 1.8rem !important;" readonly value="0.00">
                            </div>
                        </div>
                    </div>
                </div>



                
                <div class="text-end mt-4 pt-2">
                    <a href="/" class="btn btn-volver btn-sm px-4 me-2 shadow-sm py-2 fw-bold text-white" title="Volver a la página principal">← VOLVER</a>
                    <button class="btn btn-excel btn-sm px-4 me-2 shadow-sm py-2" onclick="exportarExcel()">📊 EXCEL</button>
                    <button class="btn btn-excel btn-sm px-4 me-2 shadow-sm py-2" onclick="generarFactura()">🧾 GENERAR FACTURA</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid p-0 mt-5">
        <img src="images/FAJA-ABAJO-HRS.png" class="w-100" style="height: 50px; object-fit: cover;">
    </div>

    <div class="modal fade" id="alertaModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div id="modalContentAlerta" class="modal-content text-center p-4 border-0 shadow" style="border-radius: 15px;">
                <div id="modalIcono" class="fs-2 mb-2"></div>
                <h5 id="modalTitulo" class="fw-bold"></h5>
                <p id="modalMensaje" class="text-muted small mb-0"></p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmarEliminarModal1" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 text-center shadow border-0" style="border-radius: 15px;">
                <div class="fs-1 mb-2">❓</div>
                <h4 class="fw-bold">¿Eliminar del historial?</h4>
                <div class="mt-3">
                    <button class="btn btn-light px-4 me-2" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary px-4" onclick="abrirSegundoChequeo()">Sí, continuar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmarEliminarModal2" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-confirm-2 p-4 text-center shadow border-0" style="border-radius: 15px;">
                <div class="fs-1 mb-2">🛑</div>
                <h3 class="text-danger fw-bold">¡CONFIRMACIÓN FINAL!</h3>
                <div class="mt-3">
                    <button class="btn btn-outline-secondary px-4 me-2" data-bs-dismiss="modal">ABORTAR</button>
                    <button id="btnConfirmarBorradoFinal" class="btn btn-danger px-4 fw-bold">SÍ, BORRAR TODO</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="facturacion.js"></script>
    <!-- Principio del widget de globo de Calendly -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    <script type="text/javascript">
      window.addEventListener("load", function() {
        var labels = {
          es: "📅 Reserva una reunión",
          en: "📅 Book a meeting",
          pt: "📅 Agende uma reunião"
        };
        function resolveLang() {
          var stored = "";
          try { stored = (localStorage.getItem("marketplace-lang") || "").toLowerCase(); } catch (e) {}
          if (stored === "es" || stored === "en" || stored === "pt") return stored;
          var htmlLang = (document.documentElement.lang || "").toLowerCase().slice(0, 2);
          if (htmlLang === "es" || htmlLang === "en" || htmlLang === "pt") return htmlLang;
          return "en";
        }
        function getLabel() {
          return labels[resolveLang()] || labels.en;
        }
        function getCalendlyUrl() {
          var lang = resolveLang();
          var locale = lang === "pt" ? "pt-BR" : lang;
          var base = "https://calendly.com/hashrate-space/30min";
          var params = [
            "hide_event_type_details=0",
            "hide_gdpr_banner=1",
            "background_color=ffffff",
            "text_color=14324a",
            "primary_color=36a08e",
            "locale=" + encodeURIComponent(locale)
          ];
          return base + "?" + params.join("&");
        }
        Calendly.initBadgeWidget({
          url: getCalendlyUrl(),
          text: getLabel(),
          color: "#36a08e",
          textColor: "#ffffff",
          branding: false
        });
        function applyLabel() {
          var badge = document.querySelector(".calendly-badge-widget");
          var el = document.querySelector(".calendly-badge-content");
          if (badge) {
            badge.style.right = "20px";
            badge.style.bottom = "20px";
          }
          if (el) el.textContent = getLabel();
          if (el) {
            el.style.padding = "14px 20px";
            el.style.borderRadius = "999px";
            el.style.fontWeight = "700";
            el.style.letterSpacing = "0.2px";
            el.style.boxShadow = "0 10px 24px rgba(15,39,66,0.28)";
          }
        }
        applyLabel();
        setInterval(applyLabel, 1000);
      });
    </script>
    <!-- Final del widget de globo de Calendly -->
</body>
<link rel="stylesheet" href="facturacion.css">
</html>
