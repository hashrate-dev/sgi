    <!-- Calendly: botón flotante + popup modal (la página actual queda visible detrás) -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
    <script>
      (function () {
        var a = Element.prototype.appendChild;
        var b = Element.prototype.insertBefore;
        Element.prototype.appendChild = function (c) {
          if (c && c.classList && c.classList.contains("calendly-spinner")) return c;
          return a.call(this, c);
        };
        Element.prototype.insertBefore = function (c, r) {
          if (c && c.classList && c.classList.contains("calendly-spinner")) return c;
          return b.call(this, c, r);
        };
      })();
    </script>
